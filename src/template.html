<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>{{ticketNumber}}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    @page {
      size: A4;
      margin: 0;
    }
    
    body {
      font-family: 'Helvetica Neue', Arial, sans-serif;
      font-size: 11pt;
      line-height: 1.4;
      color: #1a1a1a;
      background: white;
    }
    
    .ticket-page {
      width: 210mm;
      height: 297mm;
      padding: 20mm;
      position: relative;
      page-break-after: always;
      background: white;
    }
    
    .ticket-page:last-child {
      page-break-after: auto;
    }
    
    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 15px;
      border-bottom: 2px solid #e60000;
      margin-bottom: 20px;
    }
    
    .header-left {
      font-size: 18pt;
      font-weight: 700;
      color: #e60000;
      letter-spacing: -0.5px;
    }
    
    .header-right {
      font-size: 10pt;
      color: #666;
    }
    
    /* Route */
    .route {
      font-size: 14pt;
      font-weight: 600;
      color: #333;
      margin-bottom: 25px;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }
    
    /* Passenger info */
    .passenger-info {
      margin-bottom: 25px;
    }
    
    .passenger-name {
      font-size: 22pt;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 12px;
      letter-spacing: -0.3px;
    }
    
    .meta-row {
      display: flex;
      gap: 30px;
      font-size: 10pt;
      color: #555;
    }
    
    .meta-item strong {
      color: #1a1a1a;
      display: block;
      font-size: 9pt;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 2px;
    }
    
    /* Journey details */
    .journey {
      background: #f8f9fa;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 25px;
    }
    
    .journey-date {
      font-size: 16pt;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 15px;
    }
    
    .journey-leg {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 15px 0;
      border-bottom: 1px solid #e0e0e0;
    }
    
    .journey-leg:last-child {
      border-bottom: none;
    }
    
    .time-block {
      text-align: center;
      min-width: 60px;
    }
    
    .time {
      font-size: 20pt;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1;
    }
    
    .time-label {
      font-size: 8pt;
      color: #888;
      text-transform: uppercase;
      margin-top: 4px;
    }
    
    .arrow {
      color: #e60000;
      font-size: 16pt;
      font-weight: 700;
    }
    
    .location {
      flex: 1;
      font-size: 12pt;
      font-weight: 600;
      color: #333;
    }
    
    .transport-badge {
      background: #e60000;
      color: white;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 9pt;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .class-info {
      margin-top: 15px;
      font-size: 10pt;
      color: #666;
      font-style: italic;
    }
    
    /* Footer / Conditions */
    .conditions {
      position: absolute;
      bottom: 20mm;
      left: 20mm;
      right: 20mm;
      font-size: 8pt;
      line-height: 1.5;
      color: #666;
      border-top: 1px solid #eee;
      padding-top: 15px;
    }
    
    .conditions h3 {
      font-size: 9pt;
      color: #1a1a1a;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .conditions p {
      margin-bottom: 6px;
    }
    
    .seller {
      margin-top: 10px;
      font-weight: 600;
      color: #333;
    }
    
    /* Print optimizations */
    @media print {
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>
</head>
<body>
  <!-- Ticket pages will be injected here -->
  {{TICKET_PAGES}}
</body>
</html>
